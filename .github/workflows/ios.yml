name: iOS App Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build with macOS 26 / Xcode 26.4 / iOS 26.4 Simulator
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.4"

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          xcodebuild -showsdks
          xcrun simctl list runtimes

      - name: Set Default Scheme
        run: |
          scheme_list=$(xcodebuild -list -json | tr -d "\n")
          default=$(echo "$scheme_list" | ruby -e "require 'json'; puts JSON.parse(STDIN.read)['project']['targets'][0]")
          echo "$default" > default
          echo "Using default scheme: $default"

      - name: Resolve project file
        run: |
          if ls -A | grep -qi '\.xcworkspace$'; then
            echo "FILETYPE=workspace" >> $GITHUB_ENV
            echo "FILE_TO_BUILD=$(ls -A | grep -i '\.xcworkspace$' | head -1)" >> $GITHUB_ENV
          else
            echo "FILETYPE=project" >> $GITHUB_ENV
            echo "FILE_TO_BUILD=$(ls -A | grep -i '\.xcodeproj$' | head -1)" >> $GITHUB_ENV
          fi

      - name: Build
        env:
          SCHEME: default
          DESTINATION: "platform=iOS Simulator,OS=26.4,name=iPhone 17 Pro"
        run: |
          if [ "$SCHEME" = "default" ]; then SCHEME=$(cat default); fi

          xcodebuild build \
            -scheme "$SCHEME" \
            -"$FILETYPE" "$FILE_TO_BUILD" \
            -destination "$DESTINATION" \
            -derivedDataPath build/DerivedData \
            -resultBundlePath build/Memoir-Build.xcresult

      - name: Package app artifact
        run: |
          cd build/DerivedData/Build/Products/Debug-iphonesimulator
          ditto -c -k --sequesterRsrc --keepParent Memoir.app Memoir.app.zip

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: Memoir-simulator-app
          path: build/DerivedData/Build/Products/Debug-iphonesimulator/Memoir.app.zip

      - name: Upload build result bundle
        uses: actions/upload-artifact@v4
        with:
          name: Memoir-build-xcresult
          path: build/Memoir-Build.xcresult