name: iOS starter workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build and Test with macOS 26 / Xcode 26.4 / iOS 26.4 Simulator
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.4"

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          xcodebuild -showsdks
          xcrun simctl list runtimes
          xcrun simctl list devicetypes | grep "iPhone 17 Pro" || true

      - name: Set Default Scheme
        run: |
          scheme_list=$(xcodebuild -list -json | tr -d "\n")
          default=$(echo "$scheme_list" | ruby -e "require 'json'; puts JSON.parse(STDIN.read)['project']['targets'][0]")
          echo "$default" > default
          echo "Using default scheme: $default"

      - name: Resolve project file
        run: |
          if ls -A | grep -qi '\.xcworkspace$'; then
            echo "FILETYPE=workspace" >> $GITHUB_ENV
            echo "FILE_TO_BUILD=$(ls -A | grep -i '\.xcworkspace$' | head -1)" >> $GITHUB_ENV
          else
            echo "FILETYPE=project" >> $GITHUB_ENV
            echo "FILE_TO_BUILD=$(ls -A | grep -i '\.xcodeproj$' | head -1)" >> $GITHUB_ENV
          fi

      - name: Build
        env:
          SCHEME: default
          DESTINATION: "platform=iOS Simulator,OS=26.4,name=iPhone 17 Pro"
        run: |
          if [ "$SCHEME" = "default" ]; then SCHEME=$(cat default); fi
          xcodebuild build-for-testing \
            -scheme "$SCHEME" \
            -"$FILETYPE" "$FILE_TO_BUILD" \
            -destination "$DESTINATION"

      - name: Test
        env:
          SCHEME: default
          DESTINATION: "platform=iOS Simulator,OS=26.4,name=iPhone 17 Pro"
        run: |
          if [ "$SCHEME" = "default" ]; then SCHEME=$(cat default); fi
          xcodebuild test-without-building \
            -scheme "$SCHEME" \
            -"$FILETYPE" "$FILE_TO_BUILD" \
            -destination "$DESTINATION"
